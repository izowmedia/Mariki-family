<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Events · Mariki Portal</title>
<link rel="stylesheet" href="css/styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head><body>
<div class="app" id="app"><div class="center" style="grid-column:1/-1"><div class="spinner"></div></div></div>
<script type="module">
import { db, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "./js/firebase.js";
import { requireAuth, renderSidebar, bindLogout, toast } from "./js/common.js";

const {user, profile} = await requireAuth();
if(!profile || profile.status!=="approved"){ location.href="dashboard.html"; }
const canManage = ["admin","superadmin"].includes(profile.role);
const app=document.getElementById("app");
app.innerHTML = renderSidebar("events.html",profile) + `
  <main class="main">
    <div class="h1">Events</div>
    <p class="muted">Family gatherings and important dates.</p>
    ${canManage?`<div class="glass card" style="margin-top:16px">
      <div class="h2">Create event</div>
      <form id="f" class="grid grid-4" style="margin-top:10px">
        <input class="input" id="etitle" placeholder="Title" required style="grid-column:1/3"/>
        <input class="input" id="edate" type="date" required/>
        <input class="input" id="eloc" placeholder="Location"/>
        <textarea class="input" id="edesc" placeholder="Description" style="grid-column:1/5"></textarea>
        <div style="grid-column:1/5;display:flex;justify-content:flex-end"><button class="btn btn-gold">Save</button></div>
      </form>
    </div>`:""}
    <div class="grid grid-2" id="list" style="margin-top:16px"></div>
  </main>`;
bindLogout();

async function load(){
  const snap = await getDocs(collection(db,"events"));
  const rows=[]; snap.forEach(d=>rows.push({id:d.id,...d.data()}));
  rows.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  document.getElementById("list").innerHTML = rows.length ? rows.map(e=>`
    <div class="glass card">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
        <div><div class="h2">${e.title||"Untitled"}</div>
          <div class="muted">${e.date||""} ${e.location?"· "+e.location:""}</div>
          <p style="margin-top:8px">${e.description||""}</p></div>
        ${canManage?`<button class="btn btn-danger" data-id="${e.id}">Delete</button>`:""}
      </div>
    </div>`).join("") : `<p class="muted">No events yet.</p>`;
  document.querySelectorAll("[data-id]").forEach(b=>b.addEventListener("click", async()=>{
    if(!confirm("Delete event?")) return;
    await deleteDoc(doc(db,"events",b.dataset.id)); toast("Deleted"); load();
  }));
}
load();
document.getElementById("f")?.addEventListener("submit", async(e)=>{
  e.preventDefault();
  await addDoc(collection(db,"events"),{title:etitle.value,date:edate.value,location:eloc.value,description:edesc.value,createdAt:serverTimestamp(),createdBy:user.uid});
  e.target.reset(); toast("Event created"); load();
});
</script>
</body></html>
